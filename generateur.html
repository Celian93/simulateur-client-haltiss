function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pickN(arr, n) { return [...arr].sort(() => Math.random() - 0.5).slice(0, n); }

  'montpellier':34,'nice':6,'nantes':44,'rennes':35,'strasbourg':67,'grenoble':38,

function getZones(dept, ville) {
  // Essai 1 : numéro de département tapé
  const num = dept.trim().replace(/\D/g,'').slice(0,2);
  if (num && ZONES_DEPART[num]) return ZONES_DEPART[num];
  // Essai 2 : déduire depuis la ville
  const villeKey = ville.trim().toLowerCase().split(/[\s-]/)[0];
  const deptFromVille = VILLE_TO_DEPT[villeKey];
  if (deptFromVille && ZONES_DEPART[String(deptFromVille).padStart(2,'0')]) {
    return ZONES_DEPART[String(deptFromVille).padStart(2,'0')];
  }
  if (deptFromVille && ZONES_DEPART[String(deptFromVille)]) {
    return ZONES_DEPART[String(deptFromVille)];
  }
  // Fallback : Marseille par défaut
  return ZONES_DEPART['13'];
}

function computePrice(vol, dist, workers, duration, floor, elevator, urgent, weekend, geo) {
  let base = 350;
  base += vol * 28;
  base += dist * 2.5;
  base += workers * duration * 65;
  if (!elevator && floor > 0) base += floor * 30;
  if (urgent) base *= 1.25;
  if (weekend) base *= 1.20;
  base *= geo;
  const target = Math.round(base / 50) * 50;
  return { min: Math.round(target * 0.85 / 50) * 50, target, max: Math.round(target * 1.25 / 50) * 50 };
}

function isTooSimilar(cat, depart) {
  const last5 = genHistory.slice(-5);
  return last5.some(h => h.cat === cat && h.depart === depart);
}

  // Anti-répétition : max 8 tentatives
  for (let t = 0; t < 8; t++) {
    if (type === 'B2B') {
      profile = pick(B2B);
      cat = profile.cat;
      depart = pick(zones);
      arrivee = pick(zones.filter(z => z !== depart));
      if (!arrivee) arrivee = zones[0];
    } else {
      profile = pick(B2C);
      cat = profile.cat;
      depart = pick(zones);
      arrivee = pick(zones.filter(z => z !== depart));
      if (!arrivee) arrivee = zones[0];
    }
    if (!isTooSimilar(cat, depart)) break;
  }
  genHistory.push({ cat, depart });

  // Items
  if (type === 'B2B') {
    size = profile.size ? rand(...profile.size) : null;
    for (const it of profile.items) {
      if (it.qpp !== undefined && size) {
        const qty = Math.max(1, Math.round(size * it.qpp));
        items.push({ n: it.n, q: qty, f: it.f });
      } else if (it.q) {
        if (Math.random() > 0.3) items.push({ n: it.n, q: rand(...it.q), f: it.f });
      }
    }
    vol = rand(...profile.volBase);
    if (size) vol = Math.round(vol * size / 8);
    constraints = pickN([...CONTRAINTES_GENERALES, 'Intervention le vendredi soir', 'Reprise d\'activité lundi — livraison vendredi impérative', 'Matériel informatique à sécuriser', 'Câblage réseau à déposer avant la prestation'], rand(2, 4));
  } else {
    for (const it of profile.items) {
      items.push({ n: it.n, q: rand(...it.q), f: it.f });
    }
    vol = rand(...profile.vol);
    constraints = [...(profile.extra || []), ...pickN(CONTRAINTES_GENERALES, rand(1, 3))];
  }

  items = items.filter(i => i.q > 0);

  // Délai et date
  const delai = pick(DELAIS);
  const urgent = delai.includes('48h');
  const weekend = Math.random() > 0.75;

  // Distance approx
  const dist = rand(3, 35);

  // Prix
  const floor = rand(0, 5);
  const elevator = Math.random() > 0.4;
  const workers = vol < 20 ? 2 : vol < 45 ? rand(2,3) : rand(3,5);
  const duration = Math.max(2, Math.round(vol / 8 + dist / 30));
  const geo = 1.0 + Math.random() * 0.3;
  const price = computePrice(vol, dist, workers, duration, floor, elevator, urgent, weekend, geo);

  // Questions
  const questions = pickN(type === 'B2B' ? QUESTIONS_B2B : QUESTIONS_B2C, 5);

  // Résumé
  let summary = '';
  if (type === 'B2B') {
    const sizeStr = size ? ` de ${size} collaborateur${size > 1 ? 's' : ''}` : '';
    const topItems = items.slice(0,4).map(i => `${i.q} ${i.n.toLowerCase()}`).join(', ');
    summary = `Un${cat.startsWith('A') ? 'e' : ''} <b>${cat.toLowerCase()}${sizeStr}</b> prévoit de transférer ses locaux de <b>${depart}</b> vers <b>${arrivee}</b>, soit environ ${dist} km. Le besoin comprend notamment : ${topItems}. Volume estimé : <b>${vol} m³</b>. Intervention souhaitée <b>${delai}</b>. Budget cible estimé : <b>${price.target.toLocaleString('fr-FR')} € HT</b>.`;
  } else {
    const person = cat.startsWith('Fam') ? 'Une famille' : cat.startsWith('Couple') ? 'Un couple' : cat.startsWith('Per') ? 'Une personne âgée' : 'Le client';
    const topItems = items.slice(0,4).map(i => `${i.q} ${i.n.toLowerCase()}`).join(', ');
    summary = `${person} (<b>${cat.toLowerCase()}</b>) souhaite déménager de <b>${depart}</b> vers <b>${arrivee}</b> (environ ${dist} km). Éléments : ${topItems}. Volume estimé : <b>${vol} m³</b>. Souhaite intervenir <b>${delai}</b>. Budget cible : <b>${price.target.toLocaleString('fr-FR')} € TTC</b>.`;
  }

  afficher({ type, cat, depart, arrivee, dist, items, vol, constraints, delai, workers, duration, floor, elevator, price, questions, summary, urgent, weekend });
}

function afficher(d) {
  const priceLabel = d.type === 'B2B' ? 'HT' : 'TTC';
  const badgeClass = d.type === 'B2B' ? 'b2b' : 'b2c';

  const itemsHtml = d.items.map(i =>
    `<div class="item-row"><span>${i.n}${i.f ? ' <span class="fragile">fragile</span>' : ''}</span><span class="item-qty">×${i.q}</span></div>`
  ).join('');

  const contraintesHtml = d.constraints.map(c => `<span class="tag">${c}</span>`).join('');
  const questionsHtml = d.questions.map((q,i) => `<li><span class="q-num">${i+1}.</span>${q}</li>`).join('');

  const extra = [];
  if (d.urgent) extra.push('⚡ Urgent');
  if (d.weekend) extra.push('📅 Week-end');
  if (!d.elevator && d.floor > 0) extra.push(`🏢 Étage ${d.floor} sans ascenseur`);

  document.getElementById('result').innerHTML = `
    <span class="badge ${badgeClass}">${d.type === 'B2B' ? 'Professionnel' : 'Particulier'}</span>
    <div class="result-title">${d.cat}</div>
    <div class="result-sub">${d.depart} → ${d.arrivee} · ~${d.dist} km · ${d.vol} m³ · ${d.workers} déménageurs · ${d.duration}h</div>

    ${extra.length ? `<div class="tags" style="margin-bottom:12px">${extra.map(e=>`<span class="tag">${e}</span>`).join('')}</div>` : ''}

    <div class="section">
      <div class="section-title">Résumé</div>
      <div class="summary-text">${d.summary}</div>
    </div>

    <div class="section">
      <div class="section-title">Éléments à déménager</div>
      <div class="items-grid">${itemsHtml}</div>
    </div>

    ${d.constraints.length ? `<div class="section"><div class="section-title">Contraintes</div><div class="tags">${contraintesHtml}</div></div>` : ''}

    <div class="section">
      <div class="section-title">Budget estimé</div>
      <div class="budget-bar">
        <div class="budget-item"><div class="budget-label">Minimum</div><div class="budget-value">${d.price.min.toLocaleString('fr-FR')} <span class="budget-suffix">€ ${priceLabel}</span></div></div>
        <div class="budget-item main"><div class="budget-label">Cible</div><div class="budget-value">${d.price.target.toLocaleString('fr-FR')} <span class="budget-suffix">€ ${priceLabel}</span></div></div>
        <div class="budget-item"><div class="budget-label">Maximum</div><div class="budget-value">${d.price.max.toLocaleString('fr-FR')} <span class="budget-suffix">€ ${priceLabel}</span></div></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Questions à poser</div>
      <ul class="questions-list">${questionsHtml}</ul>
    </div>

    <div class="actions">
      <button class="btn-copy" onclick="copier()">Copier le résumé</button>
      <button class="btn-new" onclick="generer()">Nouveau client ↻</button>
    </div>
  `;
  document.getElementById('result').className = 'result show';
  document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copier() {
  const el = document.querySelector('.summary-text');
  const text = el ? el.innerText : '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = 'Copié ✓';
    setTimeout(() => btn.textContent = 'Copier le résumé', 1800);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.target.id === 'ville' || e.target.id === 'dept')) generer();
});
</script>
