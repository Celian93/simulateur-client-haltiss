<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haltiss — Générateur de clients</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #020617;
  background-image:
    radial-gradient(circle at 15% 0%, rgba(16,185,129,0.16), transparent 45%),
    radial-gradient(circle at 100% 20%, rgba(34,211,238,0.12), transparent 45%),
    linear-gradient(135deg, #020617 0%, #0b1220 55%, #062018 100%);
  background-attachment: fixed;
  color: #e2e8f0;
  min-height: 100vh;
}

/* ── LOGIN SCREEN ── */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-box {
  background: rgba(15,23,42,0.65);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 48px 40px;
  text-align: center;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.45);
}

.login-box .logo-plate { display: inline-block; background: #f8fafc; border-radius: 16px; padding: 10px 18px; margin-bottom: 28px; }
.login-box img { width: 160px; display: block; }

.login-box h2 {
  font-size: 1.1rem;
  color: #f1f5f9;
  margin-bottom: 6px;
  font-weight: 600;
}

.login-box p {
  font-size: 0.85rem;
  color: #94a3b8;
  margin-bottom: 28px;
}

.btn-login {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, #10b981, #22d3ee);
  color: #022c22;
  border: none;
  border-radius: 999px;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.btn-login:hover { opacity: 0.92; }
.btn-login:active { transform: scale(0.98); }

/* ── APP ── */
#app { display: none; }

header {
  background: rgba(2,6,23,0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 0 24px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}

header .logo-plate { display: inline-flex; align-items: center; background: #f8fafc; border-radius: 10px; padding: 4px 10px; }
header img { height: 28px; display: block; }

.user-bar {
  display: flex;
  align-items: center;
  gap: 12px;
}

.user-name {
  font-size: 0.82rem;
  color: #94a3b8;
  font-weight: 500;
}

.btn-logout {
  font-size: 0.78rem;
  color: #94a3b8;
  background: none;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 999px;
  padding: 4px 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-logout:hover { border-color: #f87171; color: #f87171; }

/* ── MAIN ── */
main {
  max-width: 680px;
  margin: 0 auto;
  padding: 32px 16px 48px;
}

.page-title {
  font-size: 1.35rem;
  font-weight: 700;
  color: #f1f5f9;
  margin-bottom: 4px;
}
.page-sub {
  font-size: 0.85rem;
  color: #94a3b8;
  margin-bottom: 24px;
}

/* ── FORM ── */
.form {
  background: rgba(15,23,42,0.55);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 24px;
  padding: 22px;
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

.row { display: flex; gap: 12px; flex-wrap: wrap; }
.field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 140px; }
label { font-size: 0.78rem; font-weight: 700; color: #6ee7b7; letter-spacing: 0.02em; text-transform: uppercase; }

input, select {
  padding: 10px 13px;
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  font-size: 0.92rem;
  font-family: inherit;
  color: #f1f5f9;
  outline: none;
  transition: border-color 0.15s;
  background: rgba(2,6,23,0.5);
  text-overflow: ellipsis;
  overflow: hidden;
  white-space: nowrap;
}
select { color-scheme: dark; cursor: pointer; }
input::placeholder { color: #475569; }
input:focus, select:focus { border-color: #10b981; background: rgba(2,6,23,0.75); }
input[readonly] { color: #94a3b8; background: rgba(2,6,23,0.3); cursor: default; }
input[readonly]:focus { border-color: rgba(255,255,255,0.1); }

.location-info {
  display: none;
  font-size: 0.8rem;
  color: #94a3b8;
  background: rgba(16,185,129,0.08);
  border: 1px solid rgba(16,185,129,0.2);
  border-radius: 10px;
  padding: 8px 12px;
}
.location-info.show { display: block; }
.location-info b { color: #6ee7b7; }
.location-info.pending { color: #64748b; font-style: italic; }
.location-info.error { color: #fca5a5; background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.2); }

.btn-generate {
  padding: 13px;
  background: linear-gradient(135deg, #10b981, #22d3ee);
  color: #022c22;
  border: none;
  border-radius: 999px;
  font-size: 0.97rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.01em;
}
.btn-generate:hover { opacity: 0.92; }
.btn-generate:active { transform: scale(0.98); }

/* ── RESULT ── */
.result {
  background: rgba(15,23,42,0.55);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 22px;
  margin-top: 16px;
  display: none;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.result.show { display: block; }

.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 0.72rem;
  font-weight: 700;
  margin-bottom: 10px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.badge.b2b { background: rgba(34,211,238,0.14); color: #67e8f9; border: 1px solid rgba(34,211,238,0.3); }
.badge.b2c { background: rgba(16,185,129,0.14); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }

.result-title { font-size: 1.05rem; font-weight: 700; color: #f1f5f9; margin-bottom: 3px; }
.result-sub { font-size: 0.8rem; color: #94a3b8; margin-bottom: 18px; }

.section { margin-bottom: 18px; }
.section-title {
  font-size: 0.7rem;
  font-weight: 700;
  color: #6ee7b7;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
  padding-bottom: 5px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.fiche-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: #6ee7b7;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.kv-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.kv-list li {
  font-size: 0.85rem;
  color: #cbd5e1;
  padding: 7px 11px;
  background: rgba(2,6,23,0.4);
  border-radius: 10px;
}
.kv-list li b { color: #f1f5f9; font-weight: 600; }

.address-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }
.address-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}

.item-group-label {
  font-size: 0.72rem;
  font-weight: 700;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin: 10px 0 6px;
}
.item-group-label:first-child { margin-top: 0; }

.items-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.item-row {
  font-size: 0.83rem;
  color: #cbd5e1;
  padding: 6px 9px;
  background: rgba(2,6,23,0.4);
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.item-qty { font-weight: 700; color: #6ee7b7; }
.fragile { font-size: 0.68rem; color: #fcd34d; font-weight: 700; background: rgba(252,211,77,0.14); padding: 1px 5px; border-radius: 4px; margin-left: 4px; }

.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-size: 0.79rem; background: rgba(252,211,77,0.12); color: #fcd34d; padding: 4px 9px; border-radius: 999px; border: 1px solid rgba(252,211,77,0.25); }

.budget-single {
  text-align: center;
  padding: 16px;
  border-radius: 16px;
  background: linear-gradient(135deg, #10b981, #22d3ee);
}
.budget-single-label { font-size: 0.7rem; color: rgba(2,6,23,0.65); font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
.budget-single-value { font-size: 1.4rem; font-weight: 700; color: #022c22; margin-top: 4px; }
.budget-suffix { font-size: 0.75rem; font-weight: 400; }
.price-note { font-size: 0.72rem; color: #64748b; font-style: italic; margin-top: 8px; text-align: center; }

.reserve-block {
  background: rgba(16,185,129,0.06);
  border: 1px solid rgba(16,185,129,0.2);
  border-radius: 16px;
  padding: 16px;
}
.reserve-title { font-size: 0.95rem; font-weight: 700; color: #f1f5f9; margin-bottom: 6px; }
.reserve-desc { font-size: 0.82rem; color: #94a3b8; line-height: 1.5; margin-bottom: 12px; }
.reserve-form { display: flex; gap: 8px; flex-wrap: wrap; }
.reserve-form input {
  flex: 1;
  min-width: 180px;
  padding: 11px 13px;
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 999px;
  font-size: 0.88rem;
  color: #f1f5f9;
  background: rgba(2,6,23,0.5);
  outline: none;
}
.reserve-form input:focus { border-color: #10b981; }
.btn-reserve {
  padding: 11px 22px;
  border: none;
  border-radius: 999px;
  background: linear-gradient(135deg, #10b981, #22d3ee);
  color: #022c22;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.15s;
}
.btn-reserve:hover { opacity: 0.92; }
.btn-reserve:disabled { opacity: 0.7; cursor: default; }
.reserve-status { font-size: 0.8rem; margin-top: 10px; color: #94a3b8; }
.reserve-status.success { color: #6ee7b7; }
.reserve-status.error { color: #fca5a5; }

.stats-block { background: rgba(2,6,23,0.3); border-radius: 16px; padding: 16px; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.stat-item { text-align: center; padding: 10px 6px; border-radius: 12px; background: rgba(2,6,23,0.4); border: 1px solid rgba(255,255,255,0.08); }
.stat-value { font-size: 1.3rem; font-weight: 700; color: #6ee7b7; }
.stat-label { font-size: 0.68rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.03em; margin-top: 2px; }
.stats-disclaimer { font-size: 0.72rem; color: #64748b; font-style: italic; line-height: 1.5; }

.flags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.flag { font-size: 0.78rem; padding: 3px 9px; border-radius: 999px; font-weight: 600; }
.flag.urgent { background: rgba(248,113,113,0.14); color: #fca5a5; border: 1px solid rgba(248,113,113,0.3); }
.flag.weekend { background: rgba(252,211,77,0.14); color: #fcd34d; border: 1px solid rgba(252,211,77,0.3); }
.flag.noelev { background: rgba(196,132,252,0.14); color: #c4b4ff; border: 1px solid rgba(196,132,252,0.3); }

.actions { display: flex; gap: 8px; margin-top: 18px; }
.btn-copy {
  flex: 1;
  padding: 10px;
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 999px;
  background: transparent;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  color: #6ee7b7;
  transition: all 0.15s;
}
.btn-copy:hover { background: rgba(16,185,129,0.1); border-color: #10b981; }
.btn-new {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 999px;
  background: linear-gradient(135deg, #10b981, #22d3ee);
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  color: #022c22;
  transition: opacity 0.15s;
}
.btn-new:hover { opacity: 0.9; }

@media (max-width: 500px) {
  .items-grid { grid-template-columns: 1fr; }
  .address-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-box">
    <span class="logo-plate"><img src="logo.png" alt="Haltiss" /></span>
    <h2>Espace agents de liaison</h2>
    <p>Connectez-vous pour accéder au réseau et à la plateforme Haltiss</p>
    <button class="btn-login" onclick="netlifyIdentity.open('login')">Se connecter</button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <header>
    <span class="logo-plate"><img src="logo.png" alt="Haltiss" /></span>
    <div class="user-bar">
      <span class="user-name" id="user-name"></span>
      <button class="btn-logout" onclick="netlifyIdentity.logout()">Déconnexion</button>
    </div>
  </header>

  <main>
    <div class="page-title">Réseau Haltiss</div>
    <p class="page-sub">Renseigner les informations sur l'entreprise du prestataire</p>

    <div class="form">
      <div class="row">
        <div class="field">
          <label>Code postal</label>
          <input type="text" id="cp" inputmode="numeric" maxlength="5" placeholder="Ex : 13001" />
        </div>
        <div class="field">
          <label>Département</label>
          <input type="text" id="departement" placeholder="Auto" readonly />
        </div>
        <div class="field">
          <label>Région</label>
          <input type="text" id="region" placeholder="Auto" readonly />
        </div>
        <div class="field">
          <label>Ville du prestataire</label>
          <input type="text" id="ville" placeholder="Ex : Marseille" />
        </div>
        <div class="field">
          <label>Secteur d'activité</label>
          <select id="secteur">
            <option value="demenagement">Déménagement</option>
            <option value="nettoyage">Nettoyage</option>
          </select>
        </div>
      </div>

      <div class="location-info" id="location-info"></div>

      <button class="btn-generate" onclick="generer()">Recherche de mise en relation client</button>
    </div>

    <div class="result" id="result"></div>
  </main>
</div>

<script>
// ── AUTH ──────────────────────────────────────────────────────────────────────
netlifyIdentity.on('init', user => {
  if (user) showApp(user);
});

netlifyIdentity.on('login', user => {
  netlifyIdentity.close();
  showApp(user);
});

netlifyIdentity.on('logout', () => {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
});

function showApp(user) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const name = user.user_metadata?.full_name || user.email;
  document.getElementById('user-name').textContent = name;
}

// Distance à vol d'oiseau entre deux points, corrigée d'un facteur route (~1.3
// en moyenne en France) pour approcher une distance de trajet réelle et gratuite.
function realDistanceKm(coordsA, coordsB) {
  if (!coordsA || !coordsB) return null;
  const R = 6371;
  const toRad = deg => deg * Math.PI / 180;
  const dLat = toRad(coordsB.lat - coordsA.lat);
  const dLon = toRad(coordsB.lon - coordsA.lon);
  const a = Math.sin(dLat / 2) ** 2
    + Math.cos(toRad(coordsA.lat)) * Math.cos(toRad(coordsB.lat)) * Math.sin(dLon / 2) ** 2;
  const straight = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  const road = Math.max(straight * 1.3, 1);
  return Math.round(road * 10) / 10;
}

function fakePostalCode(depCode) {
  if (!depCode) return '';
  if (depCode === '2A' || depCode === '2B') return '20' + String(rand(0, 999)).padStart(3, '0');
  if (depCode.length === 3) return depCode + String(rand(0, 99)).padStart(2, '0');
  return depCode.padStart(2, '0') + String(rand(0, 999)).padStart(3, '0');
}

function formatDuration(h) {
  if (h <= 4) return `Demi-journée (environ ${h}h)`;
  if (h <= 8) return `Une journée (${h} à ${h + 1}h)`;
  const days = Math.ceil(h / 8);
  return `${days} jours (environ ${h}h au total)`;
}

  if (amount <= 12) return 'Camion 12 m³';

  if (amount <= 45) return '2 camions de 20 m³, ou 1 camion de 30 à 40 m³ avec hayon';
  return 'Poids lourd 40 m³ ou plus avec hayon (ou plusieurs rotations)';
}

function categorizeItemDemenagement(name) {
  if (/ordinateur|écran|serveur|onduleur|imprimante|informatique|tpe|caisse enregistreuse|destructeur|tablette|vidéoprojecteur/i.test(name)) return 'Informatique';
  if (/carton|archive|dossier/i.test(name)) return 'Cartons / Archives';
  return 'Mobilier';
}

function categorizeItemNettoyage(name) {
  if (/sol|moquette|tapis/i.test(name)) return 'Sols';
  if (/sanitaire|douche|vestiaire/i.test(name)) return 'Sanitaires';
  if (/vitre|vitrine/i.test(name)) return 'Vitres';
  if (/cuisine|hotte/i.test(name)) return 'Cuisine';
  return 'Autres prestations';
}

function prestationsDemenagement(items) {
  const hasFragile = items.some(i => i.f);
  const list = ['Protection du mobilier', 'Démontage du mobilier'];
  if (hasFragile) list.push('Emballage des équipements fragiles');
  list.push('Chargement', 'Transport', 'Déchargement', 'Remontage du mobilier', 'Installation dans les nouveaux locaux');
  if (hasFragile) list.push('Déballage des équipements');
  list.push('Évacuation des cartons et emballages');
  return list;
}

function prestationsNettoyageComplement() {
  return [
    'Vérification des zones sensibles avant intervention','Utilisation de produits adaptés aux surfaces',
    'Contrôle qualité en fin de prestation','Évacuation des déchets et emballages',
    'Aération des locaux après intervention',
  ];
}

function contraintesDerivees(items) {
  const extra = [];
  if (items.some(i => i.f)) extra.push('Le matériel fragile doit être manipulé avec précaution.');
  if (items.some(i => /archive|dossier/i.test(i.n))) extra.push('Les documents et archives sont confidentiels.');
  return extra;
}

// ── UTILITAIRES ───────────────────────────────────────────────────────────────
const pick = a => a[Math.floor(Math.random() * a.length)];
const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const pickN = (a, n) => [...a].sort(() => Math.random() - 0.5).slice(0, n);

function getZones(dept, ville) {
  const num = dept.trim().replace(/\D/g,'').slice(0,2);
  if (num && ZONES[num]) return ZONES[num];
  const key = ville.trim().toLowerCase().split(/[\s-]/)[0];
  const d = VILLE_DEPT[key];
  if (d && ZONES[d]) return ZONES[d];
  return ZONES['13'];
}

// Estime le budget maximum réaliste que le client est prêt à mettre pour cette
// prestation précise : ni sous-évalué (le prestataire doit être payé à sa juste
// valeur), ni surévalué (ça reste un tarif de marché plausible pour ce type de mission).
function computePrice(sector, amount, dist, workers, duration, floor, elevator, urgent, weekend) {
  const p = sector.price;
  let base = p.base + amount * p.unitRate + dist * p.distRate + workers * duration * p.workerRate;
  if (!elevator && floor > 0) base += floor * 30;
  if (urgent) base *= p.urgentMult;
  if (weekend) base *= p.weekendMult;
  base *= (0.9 + Math.random() * 0.3); // ±variance réaliste selon le prestataire/l'état du bien
  base = Math.max(base, p.floor);
  return Math.round(base / 10) * 10;
}

// ── LOCALISATION (code postal → commune / département / région / pays) ────────
let resolvedLocation = null;
let resolvedFor = '';

function debounce(fn, delay) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay); };
}

function renderLocationInfo(state, data) {
  const el = document.getElementById('location-info');
  const deptInput = document.getElementById('departement');
  const regionInput = document.getElementById('region');
  const villeInput = document.getElementById('ville');
  el.classList.remove('pending', 'error');
  if (state === 'pending') {
    el.classList.add('show', 'pending');
    el.textContent = 'Recherche de la commune…';
    deptInput.value = '';
    regionInput.value = '';
  } else if (state === 'error') {
    el.classList.add('show', 'error');
    el.textContent = 'Code postal introuvable — vérifiez la saisie.';
    deptInput.value = '';
    regionInput.value = '';
  } else if (state === 'ok') {
    el.classList.remove('show');
    el.innerHTML = '';
    villeInput.value = data.commune;
    deptInput.value = `${data.departementNom} (${data.departementCode})`;
    deptInput.title = deptInput.value;
    regionInput.value = data.regionNom;
    regionInput.title = data.regionNom;
  } else {
    el.classList.remove('show');
    el.innerHTML = '';
    deptInput.value = '';
    regionInput.value = '';
  }
}

async function resolveCodePostal(cp) {
  if (!/^\d{5}$/.test(cp)) {
    resolvedLocation = null;
    resolvedFor = '';
    renderLocationInfo('idle');
    return;
  }
  renderLocationInfo('pending');
  try {
    const res = await fetch(`https://geo.api.gouv.fr/communes?codePostal=${cp}&fields=nom,code,codeDepartement,departement,region&format=json`);
    const data = await res.json();
    if (!Array.isArray(data) || !data.length) {
      resolvedLocation = null;
      resolvedFor = cp;
      renderLocationInfo('error');
      return;
    }
    const c = pick(data);
    const departementCode = c.codeDepartement;

    // Récupère de vraies communes du département (+ coordonnées) pour générer des
    // zones cohérentes et calculer des distances réelles entre elles.
    let zones = [];
    let zoneCoords = {};
    try {
      const zonesRes = await fetch(`https://geo.api.gouv.fr/departements/${departementCode}/communes?fields=nom,population,centre&format=json`);
      const communes = await zonesRes.json();
      if (Array.isArray(communes) && communes.length) {
        const withPop = communes.filter(x => x.population);
        // Filet de sécurité : si trop peu de communes ont une population renseignée
        // (petits départements/collectivités), on repart de la liste complète.
        const base = withPop.length >= 2 ? withPop : communes;
        const top = base.sort((a, b) => (b.population || 0) - (a.population || 0)).slice(0, 15);
        zones = top.map(x => x.nom);
        top.forEach(x => {
          if (x.centre && Array.isArray(x.centre.coordinates)) {
            zoneCoords[x.nom] = { lon: x.centre.coordinates[0], lat: x.centre.coordinates[1] };
          }
        });
        // Ultime filet : la commune elle-même si l'API n'a rien retourné d'exploitable.
        if (!zones.length) zones = [c.nom];
      } else {
        zones = [c.nom];
      }
    } catch (e) {
      zones = [c.nom]; // repli : au moins la commune résolue par le code postal
    }

    resolvedLocation = {
      commune: c.nom,
      departementCode,
      departementNom: c.departement?.nom || '',
      regionNom: c.region?.nom || '',
      pays: 'France',
      zones,
      zoneCoords,
    };
    resolvedFor = cp;
    renderLocationInfo('ok', resolvedLocation);
  } catch (e) {
    resolvedLocation = null;
    resolvedFor = cp;
    renderLocationInfo('error');
  }
}

document.getElementById('cp').addEventListener('input', debounce(e => resolveCodePostal(e.target.value.trim()), 450));

// ── GÉNÉRATION ────────────────────────────────────────────────────────────────
async function generer() {
  const sector = SECTORS[document.getElementById('secteur').value];
  const ville = document.getElementById('ville').value.trim();
  const cp = document.getElementById('cp').value.trim();
  if (cp && cp !== resolvedFor) await resolveCodePostal(cp);

  const deptCode = (resolvedLocation && resolvedLocation.departementCode) || cp.replace(/\D/g,'').slice(0,2) || '';
  const zones = (resolvedLocation && resolvedLocation.zones && resolvedLocation.zones.length)
    ? resolvedLocation.zones
    : getZones(deptCode, ville);

  // 70% professionnel / 30% particulier, comme en réalité sur le réseau Haltiss
  let type = Math.random() < 0.7 ? 'B2B' : 'B2C';
  let profile, cat, depart, arrivee;

  for (let t = 0; t < 8; t++) {
    profile = pick(type === 'B2B' ? sector.B2B : sector.B2C);
    cat = profile.cat;
    depart = pick(zones);
    arrivee = pick(zones.filter(z => z !== depart)) || zones[0];
    const last5 = genHistory.slice(-5);
    if (!last5.some(h => h.cat === cat && h.depart === depart)) break;
  }
  genHistory.push({ cat, depart });

  let items = [], amount, constraints, size = null;

  if (type === 'B2B') {
    size = profile.size ? rand(...profile.size) : null;
    for (const it of profile.items) {
      if (it.qpp !== undefined && size) {
        items.push({ n: it.n, q: Math.max(1, Math.round(size * it.qpp)), f: it.f });
      } else if (it.q && Math.random() > 0.25) {
        items.push({ n: it.n, q: rand(...it.q), f: it.f });
      }
    }
    amount = rand(...profile.amountBase);
    // La taille (collaborateurs/postes/chambres...) module l'amountBase autour de la
    // moyenne de sa propre plage, pour rester cohérent quelle que soit l'échelle de la catégorie.
    if (size) {
      const sizeMid = (profile.size[0] + profile.size[1]) / 2;
      amount = Math.round(amount * size / sizeMid);
    }
    constraints = pickN(sector.contraintes, rand(2, 4));
  } else {
    for (const it of profile.items) items.push({ n: it.n, q: rand(...it.q), f: it.f });
    amount = rand(...profile.amount);
    constraints = [...(profile.extra || []), ...pickN(sector.contraintes, rand(1, 3))];
  }

  items = items.filter(i => i.q > 0);

  // Urgence indépendante du délai affiché (10% des demandes), pilote le badge et le prix
  const urgent = Math.random() < 0.1;
  const delai = urgent
    ? 'sous 48 heures — intervention urgente'
    : 'dans les 15 prochains jours, à convenir avec le client et le prestataire';
  // Disponibilité client : 90% sous 24h, 10% sous 48h
  const dispo = Math.random() < 0.9 ? 'sous 24h' : 'sous 48h';
  const weekend = Math.random() > 0.78;

  // Distance réelle (à vol d'oiseau + correction routière) si les coordonnées des
  // communes sont disponibles, sinon estimation raisonnable en repli.
  const coords = resolvedLocation && resolvedLocation.zoneCoords;
  const realDist = coords ? realDistanceKm(coords[depart], coords[arrivee]) : null;
  const dist = realDist !== null ? realDist : rand(3, 35);

  // Adresses de départ et d'arrivée (distinctes l'une de l'autre)
  const departFloor = rand(0, 5);
  const arriveeFloor = rand(0, 5);
  const departElevator = Math.random() > 0.4;
  const arriveeElevator = Math.random() > 0.4;
  const departQuartier = pick(QUARTIERS);
  const arriveeQuartier = pick(QUARTIERS.filter(q => q !== departQuartier)) || QUARTIERS[0];
  const departCp = resolvedLocation ? fakePostalCode(resolvedLocation.departementCode) : '';
  const arriveeCp = resolvedLocation ? fakePostalCode(resolvedLocation.departementCode) : '';

  // Le prix tient compte de la difficulté d'accès à l'arrivée (portage le plus contraignant)
  const workers = sector.workers(amount);
  const duration = sector.duration(amount, dist);
  const price = computePrice(sector, amount, dist, workers, duration, arriveeFloor, arriveeElevator, urgent, weekend);

  const clientName = type === 'B2B' ? generateCompanyName(cat) : generateClientName();
  const derivedConstraints = [...constraints, ...contraintesDerivees(items)];
  const prestationsExtra = sector.prestationsExtra(items);

  // Estimation statistique (indicative) du volume de clients proposés chaque mois,
  // avec la même répartition 70% pro / 30% particulier que le tirage réel.
  const monthlyTotal = sector.monthlyVolume();
  const monthlyPro = Math.round(monthlyTotal * 0.7);
  const monthlyPart = monthlyTotal - monthlyPro;

  afficher({
    sector, type, cat, depart, arrivee, dist, items, amount, size,
    constraints: derivedConstraints, delai, dispo, workers, duration, price,
    urgent, weekend, clientName,
    departFloor, arriveeFloor, departElevator, arriveeElevator,
    departQuartier, arriveeQuartier, departCp, arriveeCp,
    prestationsExtra, sizeUnit: profile.sizeUnit || 'collaborateur',
    monthlyTotal, monthlyPro, monthlyPart,
  });
}

function afficher(d) {
  const role = d.workers === 1 ? d.sector.roleSingular : d.sector.rolePlural;
  const flags = [
    d.urgent ? '<span class="flag urgent">⚡ Urgent</span>' : '',
    `<span class="flag" style="background:#e0f2fe;color:#0369a1">📞 Joignable ${d.dispo}</span>`,
    d.weekend ? '<span class="flag weekend">📅 Week-end</span>' : '',
    (!d.arriveeElevator && d.arriveeFloor > 0) ? `<span class="flag noelev">🏢 Étage ${d.arriveeFloor} sans ascenseur</span>` : '',
  ].filter(Boolean).join('');

  const ficheTitle = `Fiche client – Demande de ${d.sector.label.toLowerCase()} ${d.type === 'B2B' ? 'professionnel' : 'particulier'}`;

  // Section 1 : informations sur le client
  const clientInfoRows = d.type === 'B2B'
    ? [
        `<li><b>Entreprise :</b> ${d.clientName}</li>`,
        `<li><b>Activité :</b> ${d.cat}</li>`,
        d.size ? `<li><b>Nombre de ${d.sizeUnit}s :</b> ${d.size}</li>` : '',
      ]
    : [
        `<li><b>Client :</b> ${d.clientName}</li>`,
        `<li><b>Profil :</b> ${d.cat}</li>`,
      ];

  // Section 2 : adresses et informations logistiques (stationnement toujours disponible)
  const addressBlock = (label, ville, cp, quartier, floor, elevator) => `
    <div class="address-block">
      <div class="address-label">${label}</div>
      <ul class="kv-list">
        <li><b>Ville :</b> ${ville}${cp ? ` (${cp})` : ''}</li>
        <li><b>Quartier :</b> ${quartier}</li>
        <li><b>Étage :</b> ${floor === 0 ? 'Rez-de-chaussée' : `${floor}ᵉ étage`}</li>
        <li><b>Ascenseur :</b> ${elevator ? 'Oui' : 'Non'}</li>
        <li><b>Stationnement :</b> Disponible</li>
      </ul>
    </div>`;

  // Section 3 : matériel/prestations, regroupés par catégorie
  const groups = {};
  d.items.forEach(i => {
    const cat = d.sector.categorize(i.n);
    (groups[cat] = groups[cat] || []).push(i);
  });
  const itemsHtml = d.sector.categoryOrder
    .filter(cat => groups[cat] && groups[cat].length)
    .map(cat => `
      <div class="item-group-label">${cat}</div>
      <ul class="kv-list">${groups[cat].map(i => `<li>${i.q} ${i.n.toLowerCase()}${i.f ? '<span class="fragile">fragile</span>' : ''}</li>`).join('')}</ul>
    `).join('');

  document.getElementById('result').innerHTML = `
    <div class="fiche-content">
      <div class="fiche-title">${ficheTitle}</div>
      <span class="badge ${d.type === 'B2B' ? 'b2b' : 'b2c'}">${d.type === 'B2B' ? 'Professionnel' : 'Particulier'}</span>
      <div class="result-title">${d.cat}</div>
      <div class="result-sub">${d.depart} → ${d.arrivee} · ~${d.dist} km · ${d.amount} ${d.sector.unit} · ${d.workers} ${role} · ${d.duration}h</div>
      ${flags ? `<div class="flags">${flags}</div>` : ''}

      <div class="section">
        <div class="section-title">1. Informations sur le client</div>
        <ul class="kv-list">${clientInfoRows.filter(Boolean).join('')}</ul>
      </div>

      <div class="section">
        <div class="section-title">2. Informations sur ${d.sector.addressNoun}</div>
        <div class="address-grid">
          ${addressBlock('Adresse de départ', d.depart, d.departCp, d.departQuartier, d.departFloor, d.departElevator)}
          ${addressBlock('Adresse d\'arrivée', d.arrivee, d.arriveeCp, d.arriveeQuartier, d.arriveeFloor, d.arriveeElevator)}
        </div>
        <ul class="kv-list">
          <li><b>Distance entre les deux sites :</b> ${String(d.dist).replace('.', ',')} km</li>
          <li><b>Date souhaitée :</b> ${d.delai}</li>
          <li><b>${d.sector.amountLabel} :</b> ${d.amount} ${d.sector.unit}</li>
        </ul>
      </div>

      <div class="section">
        <div class="section-title">3. ${d.sector.itemsTitle}</div>
        ${itemsHtml}
      </div>

      <div class="section">
        <div class="section-title">4. Prestations demandées</div>
        <ul class="kv-list">${d.prestationsExtra.map(p => `<li>${p}</li>`).join('')}</ul>
      </div>

      ${d.constraints.length ? `
      <div class="section">
        <div class="section-title">5. Contraintes particulières</div>
        <div class="tags">${d.constraints.map(c => `<span class="tag">${c}</span>`).join('')}</div>
      </div>` : ''}

      <div class="section">
        <div class="section-title">6. Informations utiles pour le prestataire</div>
        <ul class="kv-list">
          <li><b>Nombre de ${role} conseillé :</b> ${d.workers}</li>
          <li><b>${d.sector.equipmentLabel} :</b> ${d.sector.equipment(d.amount)}</li>
          <li><b>Durée estimée de l'intervention :</b> ${formatDuration(d.duration)}</li>
        </ul>
      </div>

      <div class="section">
        <div class="section-title">7. Budget du client</div>
        <div class="budget-single">
          <div class="budget-single-label">Budget maximum que le client souhaite mettre</div>
          <div class="budget-single-value">${d.price.toLocaleString('fr-FR')} <span class="budget-suffix">€ TTC</span></div>
        </div>
        <p class="price-note">Sous réserve d'informations exactes fournies par le client — le tarif définitif sera détaillé avec lui avant intervention.</p>
      </div>

      <div class="section reserve-block">
        <div class="reserve-title">⏱️ Réserver ce client sous 24h</div>
        <p class="reserve-desc">Renseignez votre e-mail : ce client vous sera réservé sous 24h, sous réserve de prise en charge de votre part.</p>
        <div class="reserve-form">
          <input type="email" id="prestataire-email" placeholder="votre-email@exemple.fr" />
          <button class="btn-reserve" onclick="reserverClient()">Réserver le client</button>
        </div>
        <p class="reserve-status" id="reserve-status"></p>
      </div>

      <div class="section stats-block">
        <div class="section-title">Estimation de clients dans votre secteur</div>
        <div class="stats-grid">
          <div class="stat-item"><div class="stat-value">${d.monthlyTotal}</div><div class="stat-label">Clients / mois</div></div>
          <div class="stat-item"><div class="stat-value">${d.monthlyPro}</div><div class="stat-label">Professionnels</div></div>
          <div class="stat-item"><div class="stat-value">${d.monthlyPart}</div><div class="stat-label">Particuliers</div></div>
        </div>
        <p class="stats-disclaimer">Ces garanties ne sont pas à confondre avec les statistiques ci-dessus : il s'agit d'une estimation statistique, pas d'une garantie contractuelle du nombre de clients proposés.</p>
      </div>
    </div>
    <div class="actions">
      <button class="btn-copy" onclick="copier()">Copier la fiche</button>
      <button class="btn-new" onclick="generer()">Nouveau client ↻</button>
    </div>
  `;
  lastFiche = d;
  document.getElementById('result').className = 'result show';
  document.getElementById('result').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function copier() {
  const text = document.querySelector('.fiche-content')?.innerText || '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '✓ Copié';
    setTimeout(() => btn.textContent = 'Copier la fiche', 2000);
  });
}

async function reserverClient() {
  const emailInput = document.getElementById('prestataire-email');
  const statusEl = document.getElementById('reserve-status');
  const btn = document.querySelector('.btn-reserve');
  const email = emailInput.value.trim();

  statusEl.className = 'reserve-status';
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    statusEl.textContent = 'Merci de renseigner une adresse e-mail valide.';
    statusEl.classList.add('error');
    return;
  }
  if (!lastFiche) return;

  btn.disabled = true;
  emailInput.disabled = true;
  btn.textContent = 'Envoi en cours…';
  statusEl.textContent = '';

  try {
    const res = await fetch('/.netlify/functions/reserver-client', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email,
        sector: lastFiche.sector.key,
        cat: lastFiche.cat,
        depart: lastFiche.depart,
        arrivee: lastFiche.arrivee,
        dist: lastFiche.dist,
        price: lastFiche.price,
        type: lastFiche.type,
      }),
    });
    if (!res.ok) throw new Error('request failed');

    btn.textContent = '✓ Client réservé';
    statusEl.textContent = 'Un e-mail de confirmation vous a été envoyé. Ce client vous est réservé sous 24h, sous réserve de prise en charge.';
    statusEl.classList.add('success');
  } catch (e) {
    btn.disabled = false;
    emailInput.disabled = false;
    btn.textContent = 'Réserver le client';
    statusEl.textContent = 'Impossible d\'envoyer la demande pour le moment. Réessayez plus tard.';
    statusEl.classList.add('error');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && ['ville','cp'].includes(e.target.id)) generer();
});
