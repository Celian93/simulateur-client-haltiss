<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haltiss — Générateur de clients</title>
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #020617;
  background-image:
    radial-gradient(circle at 15% 0%, rgba(16,185,129,0.16), transparent 45%),
    radial-gradient(circle at 100% 20%, rgba(34,211,238,0.12), transparent 45%),
    linear-gradient(135deg, #020617 0%, #0b1220 55%, #062018 100%);
  background-attachment: fixed;
  color: #e2e8f0;
  min-height: 100vh;
}

/* ── LOGIN SCREEN ── */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-box {
  background: rgba(15,23,42,0.65);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 48px 40px;
  text-align: center;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.45);
}

.login-box .logo-plate { display: inline-block; background: #f8fafc; border-radius: 16px; padding: 10px 18px; margin-bottom: 28px; }
.login-box img { width: 160px; display: block; }

.login-box h2 {
  font-size: 1.1rem;
  color: #f1f5f9;
  margin-bottom: 6px;
  font-weight: 600;
}

.login-box p {
  font-size: 0.85rem;
  color: #94a3b8;
  margin-bottom: 28px;
}

.btn-login {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, #10b981, #22d3ee);
  color: #022c22;
  border: none;
  border-radius: 999px;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.btn-login:hover { opacity: 0.92; }
.btn-login:active { transform: scale(0.98); }

/* ── APP ── */
#app { display: none; }

header {
  background: rgba(2,6,23,0.75);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 0 24px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}

header .logo-plate { display: inline-flex; align-items: center; background: #f8fafc; border-radius: 10px; padding: 4px 10px; }
header img { height: 28px; display: block; }

.user-bar {
  display: flex;
  align-items: center;
  gap: 12px;
}

.user-name {
  font-size: 0.82rem;
  color: #94a3b8;
  font-weight: 500;
}

.btn-logout {
  font-size: 0.78rem;
  color: #94a3b8;
  background: none;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 999px;
  padding: 4px 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-logout:hover { border-color: #f87171; color: #f87171; }

/* ── MAIN ── */
main {
  max-width: 680px;
  margin: 0 auto;
  padding: 32px 16px 48px;
}

.page-title {
  font-size: 1.35rem;
  font-weight: 700;
  color: #f1f5f9;
  margin-bottom: 4px;
}
.page-sub {
  font-size: 0.85rem;
  color: #94a3b8;
  margin-bottom: 24px;
}

/* ── FORM ── */
.form {
  background: rgba(15,23,42,0.55);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 24px;
  padding: 22px;
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  flex-direction: column;
  gap: 14px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

.row { display: flex; gap: 12px; }
.field { display: flex; flex-direction: column; gap: 5px; flex: 1; }
label { font-size: 0.78rem; font-weight: 700; color: #6ee7b7; letter-spacing: 0.02em; text-transform: uppercase; }

input {
  padding: 10px 13px;
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  font-size: 0.92rem;
  color: #f1f5f9;
  outline: none;
  transition: border-color 0.15s;
  background: rgba(2,6,23,0.5);
}
input::placeholder { color: #475569; }
input:focus { border-color: #10b981; background: rgba(2,6,23,0.75); }

.type-row { display: flex; gap: 8px; }
.type-btn {
  flex: 1;
  padding: 9px 6px;
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 999px;
  background: transparent;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  color: #94a3b8;
}
.type-btn.active {
  background: linear-gradient(135deg, #10b981, #22d3ee);
  color: #022c22;
  border-color: transparent;
}

.btn-generate {
  padding: 13px;
  background: linear-gradient(135deg, #10b981, #22d3ee);
  color: #022c22;
  border: none;
  border-radius: 999px;
  font-size: 0.97rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  letter-spacing: 0.01em;
}
.btn-generate:hover { opacity: 0.92; }
.btn-generate:active { transform: scale(0.98); }

/* ── RESULT ── */
.result {
  background: rgba(15,23,42,0.55);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 22px;
  margin-top: 16px;
  display: none;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.result.show { display: block; }

.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 0.72rem;
  font-weight: 700;
  margin-bottom: 10px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.badge.b2b { background: rgba(34,211,238,0.14); color: #67e8f9; border: 1px solid rgba(34,211,238,0.3); }
.badge.b2c { background: rgba(16,185,129,0.14); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }

.result-title { font-size: 1.05rem; font-weight: 700; color: #f1f5f9; margin-bottom: 3px; }
.result-sub { font-size: 0.8rem; color: #94a3b8; margin-bottom: 18px; }

.section { margin-bottom: 18px; }
.section-title {
  font-size: 0.7rem;
  font-weight: 700;
  color: #6ee7b7;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
  padding-bottom: 5px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.summary-text {
  font-size: 0.9rem;
  line-height: 1.65;
  color: #cbd5e1;
  background: rgba(2,6,23,0.4);
  border-radius: 12px;
  padding: 13px;
  border-left: 3px solid #10b981;
}
.summary-text b { color: #f1f5f9; }

.items-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.item-row {
  font-size: 0.83rem;
  color: #cbd5e1;
  padding: 6px 9px;
  background: rgba(2,6,23,0.4);
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.item-qty { font-weight: 700; color: #6ee7b7; }
.fragile { font-size: 0.68rem; color: #fcd34d; font-weight: 700; background: rgba(252,211,77,0.14); padding: 1px 5px; border-radius: 4px; margin-left: 4px; }

.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-size: 0.79rem; background: rgba(252,211,77,0.12); color: #fcd34d; padding: 4px 9px; border-radius: 999px; border: 1px solid rgba(252,211,77,0.25); }

.budget-bar { display: flex; gap: 8px; }
.budget-item { flex: 1; text-align: center; padding: 11px 8px; border-radius: 16px; background: rgba(2,6,23,0.4); border: 1px solid rgba(255,255,255,0.08); }
.budget-item.main { background: linear-gradient(135deg, #10b981, #22d3ee); border-color: transparent; }
.budget-label { font-size: 0.68rem; color: #94a3b8; font-weight: 700; text-transform: uppercase; }
.budget-item.main .budget-label { color: rgba(2,6,23,0.65); }
.budget-value { font-size: 1rem; font-weight: 700; color: #f1f5f9; margin-top: 2px; }
.budget-item.main .budget-value { color: #022c22; font-size: 1.15rem; }
.budget-suffix { font-size: 0.68rem; font-weight: 400; }

.questions-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.questions-list li {
  font-size: 0.85rem;
  color: #cbd5e1;
  padding: 7px 11px;
  background: rgba(2,6,23,0.4);
  border-radius: 12px;
  display: flex;
  gap: 9px;
  align-items: flex-start;
}
.q-num { color: #6ee7b7; font-weight: 700; flex-shrink: 0; }

.flags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.flag { font-size: 0.78rem; padding: 3px 9px; border-radius: 999px; font-weight: 600; }
.flag.urgent { background: rgba(248,113,113,0.14); color: #fca5a5; border: 1px solid rgba(248,113,113,0.3); }
.flag.weekend { background: rgba(252,211,77,0.14); color: #fcd34d; border: 1px solid rgba(252,211,77,0.3); }
.flag.noelev { background: rgba(196,132,252,0.14); color: #c4b4ff; border: 1px solid rgba(196,132,252,0.3); }

.actions { display: flex; gap: 8px; margin-top: 18px; }
.btn-copy {
  flex: 1;
  padding: 10px;
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 999px;
  background: transparent;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  color: #6ee7b7;
  transition: all 0.15s;
}
.btn-copy:hover { background: rgba(16,185,129,0.1); border-color: #10b981; }
.btn-new {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 999px;
  background: linear-gradient(135deg, #10b981, #22d3ee);
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  color: #022c22;
  transition: opacity 0.15s;
}
.btn-new:hover { opacity: 0.9; }

@media (max-width: 500px) {
  .items-grid { grid-template-columns: 1fr; }
  .budget-bar { flex-direction: column; }
  .type-row { flex-wrap: wrap; }
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-box">
    <span class="logo-plate"><img src="logo.png" alt="Haltiss" /></span>
    <h2>Espace agents de liaison</h2>
    <p>Connectez-vous pour accéder au réseau et à la plateforme Haltiss</p>
    <button class="btn-login" onclick="netlifyIdentity.open('login')">Se connecter</button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <header>
    <span class="logo-plate"><img src="logo.png" alt="Haltiss" /></span>
    <div class="user-bar">
      <span class="user-name" id="user-name"></span>
      <button class="btn-logout" onclick="netlifyIdentity.logout()">Déconnexion</button>
    </div>
  </header>

  <main>
    <div class="page-title">Réseau Haltiss</div>
    <p class="page-sub">Renseigner les informations sur l'entreprise du prestataire</p>

    <div class="form">
      <div class="row">
        <div class="field">
          <label>Ville du prestataire</label>
          <input type="text" id="ville" placeholder="Ex : Marseille" />
        </div>
        <div class="field">
          <label>Département</label>
          <input type="text" id="dept" placeholder="Ex : 13" />
        </div>
      </div>

      <div class="field">
        <label>Type de client</label>
        <div class="type-row">
          <button class="type-btn active" data-type="auto" onclick="selectType('auto')">Aléatoire</button>
          <button class="type-btn" data-type="B2B" onclick="selectType('B2B')">Professionnel</button>
          <button class="type-btn" data-type="B2C" onclick="selectType('B2C')">Particulier</button>
        </div>
      </div>

      <button class="btn-generate" onclick="generer()">Générer un client</button>
    </div>

    <div class="result" id="result"></div>
  </main>
</div>

<script>
// ── AUTH ──────────────────────────────────────────────────────────────────────
netlifyIdentity.on('init', user => {
  if (user) showApp(user);
});

netlifyIdentity.on('login', user => {
  netlifyIdentity.close();
  showApp(user);
});

netlifyIdentity.on('logout', () => {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
});

function showApp(user) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const name = user.user_metadata?.full_name || user.email;
  document.getElementById('user-name').textContent = name;
}

    {n:'Canapé',q:[1,1],f:false},{n:'Armoire',q:[1,2],f:false},
    {n:'Cartons affaires diverses',q:[10,35],f:false},{n:'Vélo',q:[1,2],f:false},
  ]},
];

const ZONES = {
  '75':['Paris 11e','Paris 15e','Paris 18e','Paris 20e','Paris 13e','Paris 17e','Paris 3e','Paris 6e'],
  '13':['Marseille 1er','Marseille 6e','Marseille 8e','Marseille 13e','Aubagne','Allauch','Aix-en-Provence','Vitrolles','Martigues'],
  '69':['Lyon 3e','Lyon 6e','Lyon 7e','Villeurbanne','Caluire-et-Cuire','Lyon 2e','Lyon 1er'],
  '33':['Bordeaux Chartrons','Bordeaux Saint-Michel','Bordeaux Caudéran','Mérignac','Pessac','Talence'],
  '59':['Lille Wazemmes','Lille Moulins','Villeneuve-d\'Ascq','Roubaix','Tourcoing','Hellemmes'],
  '31':['Toulouse Capitole','Toulouse Compans','Toulouse Minimes','Blagnac','Colomiers','Balma'],
  '34':['Montpellier Antigone','Montpellier Port Marianne','Castelnau-le-Lez','Lattes','Grabels'],
  '06':['Nice Centre','Nice Libération','Nice Est','Antibes','Cagnes-sur-Mer','Sophia Antipolis'],
  '44':['Nantes Centre','Nantes Chantenay','Saint-Herblain','Rezé','Orvault'],
  '35':['Rennes Centre','Rennes Cleunay','Cesson-Sévigné','Bruz','Saint-Grégoire'],
  '67':['Strasbourg Centre','Strasbourg Cronenbourg','Illkirch-Graffenstaden','Schiltigheim'],
  '38':['Grenoble Centre','Grenoble Championnet','Échirolles','Saint-Martin-d\'Hères','Meylan'],
  '83':['Toulon Centre','La Seyne-sur-Mer','Hyères','Six-Fours-les-Plages'],
  '76':['Rouen Centre','Rouen Rive Gauche','Mont-Saint-Aignan','Sotteville-lès-Rouen'],
  '57':['Metz Centre','Metz Borny','Woippy','Montigny-lès-Metz'],
  '25':['Besançon Centre','Besançon Planoise','Pontarlier'],
};

const VILLE_DEPT = {
  'paris':'75','marseille':'13','lyon':'69','bordeaux':'33','lille':'59','toulouse':'31',
  'montpellier':'34','nice':'06','nantes':'44','rennes':'35','strasbourg':'67','grenoble':'38',
  'toulon':'83','aix':'13','aubagne':'13','vitrolles':'13','blagnac':'31','mérignac':'33',
  'pessac':'33','villeurbanne':'69','antibes':'06','rouen':'76','metz':'57','besançon':'25',
};

const DELAIS = [
  'sous 48 heures','dans la semaine','sous 10 jours','sous 15 jours',
  'dans le mois','d\'ici 3 semaines','dans 6 semaines','pour début du mois prochain',
];

const CONTRAINTES = [
  'Stationnement à réserver la veille','Accès livraison à confirmer avec le gardien',
  'Intervention souhaitée en matinée','Quelques objets à protéger avec couvertures',
  'Ascenseur présent mais petit (90×110 cm)','Parking souterrain — hauteur limitée 2 m',
  'Code d\'entrée à obtenir','Fin de bail à respecter impérativement',
  'Monte-meuble probablement nécessaire','Client disponible uniquement le matin',
  'Voisinage à respecter (pas d\'intervention avant 8h)','Prestataire devra fournir les cartons',
  'Intervention le vendredi soir','Reprise d\'activité lundi — livraison vendredi impérative',
  'Matériel informatique à sécuriser',
];

const Q_B2B = [
  'Intervenez-vous dans ce secteur ?','Pouvez-vous intervenir en dehors des horaires de bureau ?',
  'Proposez-vous le démontage et remontage du mobilier ?','Gérez-vous le matériel informatique fragile ?',
  'Combien de personnes pouvez-vous mobiliser ?','La fourchette de prix vous paraît-elle cohérente ?',
  'Disposez-vous d\'une assurance RC professionnelle ?','Une visite technique préalable est-elle nécessaire ?',
  'Proposez-vous la fourniture de cartons et emballage ?','Êtes-vous disponible dans ce délai ?',
];

const Q_B2C = [
  'Intervenez-vous dans ces deux communes ?','Disposez-vous d\'un monte-meuble si besoin ?',
  'Proposez-vous le démontage et remontage des meubles ?','Pouvez-vous fournir les cartons et l\'emballage ?',
  'Combien de déménageurs seriez-vous ?','La fourchette de prix vous semble-t-elle réaliste ?',
  'Êtes-vous disponible dans ce délai ?','Quelle est votre politique en cas de casse ?',
  'Avez-vous besoin d\'une visite préalable ?','Travaillez-vous aussi le samedi ?',
];

// ── UTILITAIRES ───────────────────────────────────────────────────────────────
const pick = a => a[Math.floor(Math.random() * a.length)];
const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const pickN = (a, n) => [...a].sort(() => Math.random() - 0.5).slice(0, n);

function getZones(dept, ville) {
  const num = dept.trim().replace(/\D/g,'').slice(0,2);
  if (num && ZONES[num]) return ZONES[num];
  const key = ville.trim().toLowerCase().split(/[\s-]/)[0];
  const d = VILLE_DEPT[key];
  if (d && ZONES[d]) return ZONES[d];
  return ZONES['13'];
}

function computePrice(vol, dist, workers, duration, floor, elevator, urgent, weekend) {
  let base = 350 + vol * 28 + dist * 2.5 + workers * duration * 65;
  if (!elevator && floor > 0) base += floor * 30;
  if (urgent) base *= 1.25;
  if (weekend) base *= 1.20;
  base *= (1 + Math.random() * 0.25);
  const target = Math.round(base / 50) * 50;
  return { min: Math.round(target * 0.85 / 50) * 50, target, max: Math.round(target * 1.25 / 50) * 50 };
}

// ── GÉNÉRATION ────────────────────────────────────────────────────────────────
function generer() {
  const ville = document.getElementById('ville').value.trim();
  const dept = document.getElementById('dept').value.trim();
  const zones = getZones(dept, ville);

  let type = selectedType === 'auto' ? (Math.random() > 0.45 ? 'B2C' : 'B2B') : selectedType;
  let profile, cat, depart, arrivee;

  for (let t = 0; t < 8; t++) {
    profile = pick(type === 'B2B' ? B2B : B2C);
    cat = profile.cat;
    depart = pick(zones);
    arrivee = pick(zones.filter(z => z !== depart)) || zones[0];
    const last5 = genHistory.slice(-5);
    if (!last5.some(h => h.cat === cat && h.depart === depart)) break;
  }
  genHistory.push({ cat, depart });

  let items = [], vol, constraints, size = null;

  if (type === 'B2B') {
    size = profile.size ? rand(...profile.size) : null;
    for (const it of profile.items) {
      if (it.qpp !== undefined && size) {
        items.push({ n: it.n, q: Math.max(1, Math.round(size * it.qpp)), f: it.f });
      } else if (it.q && Math.random() > 0.25) {
        items.push({ n: it.n, q: rand(...it.q), f: it.f });
      }
    }
    vol = rand(...profile.volBase);
    if (size) vol = Math.round(vol * size / 8);
    constraints = pickN(CONTRAINTES, rand(2, 4));
  } else {
    for (const it of profile.items) items.push({ n: it.n, q: rand(...it.q), f: it.f });
    vol = rand(...profile.vol);
    constraints = [...(profile.extra || []), ...pickN(CONTRAINTES, rand(1, 3))];
  }

  items = items.filter(i => i.q > 0);
  const delai = pick(DELAIS);
  const urgent = delai.includes('48h');
  // Disponibilité client : 90% sous 24h, 10% sous 48h
  const dispo = Math.random() < 0.9 ? 'sous 24h' : 'sous 48h';
  const weekend = Math.random() > 0.78;
  const dist = rand(3, 35);
  const floor = rand(0, 5);
  const elevator = Math.random() > 0.4;
  const workers = vol < 20 ? 2 : vol < 45 ? rand(2,3) : rand(3,5);
  const duration = Math.max(2, Math.round(vol / 8 + dist / 30));
  const price = computePrice(vol, dist, workers, duration, floor, elevator, urgent, weekend);
  const questions = pickN(type === 'B2B' ? Q_B2B : Q_B2C, 5);

  let summary;
  const topItems = items.slice(0,4).map(i => `${i.q} ${i.n.toLowerCase()}`).join(', ');
  if (type === 'B2B') {
    const sizeStr = size ? ` de ${size} collaborateur${size > 1 ? 's' : ''}` : '';
    summary = `Un${cat.startsWith('A') ? 'e' : ''} <b>${cat.toLowerCase()}${sizeStr}</b> prévoit de transférer ses locaux de <b>${depart}</b> vers <b>${arrivee}</b>, soit environ ${dist} km. Le besoin comprend notamment : ${topItems}. Volume estimé : <b>${vol} m³</b>. Intervention souhaitée <b>${delai}</b>. Client joignable <b>${dispo}</b>. Budget cible estimé : <b>${price.target.toLocaleString('fr-FR')} € HT</b>.`;
  } else {
    const person = cat.startsWith('Fam') ? 'Une famille' : cat.startsWith('Cou') ? 'Un couple' : cat.startsWith('Per') ? 'Une personne âgée' : 'Le client';
    summary = `${person} (<b>${cat.toLowerCase()}</b>) souhaite déménager de <b>${depart}</b> vers <b>${arrivee}</b> (environ ${dist} km). Éléments : ${topItems}. Volume estimé : <b>${vol} m³</b>. Souhaite intervenir <b>${delai}</b>. Client joignable <b>${dispo}</b>. Budget cible : <b>${price.target.toLocaleString('fr-FR')} € TTC</b>.`;
  }

  afficher({ type, cat, depart, arrivee, dist, items, vol, constraints, delai, dispo, workers, duration, floor, elevator, price, questions, summary, urgent, weekend });
}

function afficher(d) {
  const pl = d.type === 'B2B' ? 'HT' : 'TTC';
  const flags = [
    d.urgent ? '<span class="flag urgent">⚡ Urgent</span>' : '',
    `<span class="flag" style="background:#e0f2fe;color:#0369a1">📞 Joignable ${d.dispo}</span>`,
    d.weekend ? '<span class="flag weekend">📅 Week-end</span>' : '',
    (!d.elevator && d.floor > 0) ? `<span class="flag noelev">🏢 Étage ${d.floor} sans ascenseur</span>` : '',
  ].filter(Boolean).join('');

  document.getElementById('result').innerHTML = `
    <span class="badge ${d.type === 'B2B' ? 'b2b' : 'b2c'}">${d.type === 'B2B' ? 'Professionnel' : 'Particulier'}</span>
    <div class="result-title">${d.cat}</div>
    <div class="result-sub">${d.depart} → ${d.arrivee} · ~${d.dist} km · ${d.vol} m³ · ${d.workers} déménageurs · ${d.duration}h</div>
    ${flags ? `<div class="flags">${flags}</div>` : ''}
    <div class="section">
      <div class="section-title">Résumé</div>
      <div class="summary-text">${d.summary}</div>
    </div>
    <div class="section">
      <div class="section-title">Éléments à déménager</div>
      <div class="items-grid">${d.items.map(i => `<div class="item-row"><span>${i.n}${i.f ? '<span class="fragile">fragile</span>' : ''}</span><span class="item-qty">×${i.q}</span></div>`).join('')}</div>
    </div>
    ${d.constraints.length ? `<div class="section"><div class="section-title">Contraintes</div><div class="tags">${d.constraints.map(c => `<span class="tag">${c}</span>`).join('')}</div></div>` : ''}
    <div class="section">
      <div class="section-title">Budget estimé</div>
      <div class="budget-bar">
        <div class="budget-item"><div class="budget-label">Minimum</div><div class="budget-value">${d.price.min.toLocaleString('fr-FR')} <span class="budget-suffix">€ ${pl}</span></div></div>
        <div class="budget-item main"><div class="budget-label">Cible</div><div class="budget-value">${d.price.target.toLocaleString('fr-FR')} <span class="budget-suffix">€ ${pl}</span></div></div>
        <div class="budget-item"><div class="budget-label">Maximum</div><div class="budget-value">${d.price.max.toLocaleString('fr-FR')} <span class="budget-suffix">€ ${pl}</span></div></div>
      </div>
    </div>
    <div class="section">
      <div class="section-title">Questions à poser</div>
      <ul class="questions-list">${d.questions.map((q,i) => `<li><span class="q-num">${i+1}.</span>${q}</li>`).join('')}</ul>
    </div>
    <div class="actions">
      <button class="btn-copy" onclick="copier()">Copier le résumé</button>
      <button class="btn-new" onclick="generer()">Nouveau client ↻</button>
    </div>
  `;
  document.getElementById('result').className = 'result show';
  document.getElementById('result').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function copier() {
  const text = document.querySelector('.summary-text')?.innerText || '';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '✓ Copié';
    setTimeout(() => btn.textContent = 'Copier le résumé', 2000);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && ['ville','dept'].includes(e.target.id)) generer();
});
</script>
